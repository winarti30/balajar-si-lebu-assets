.character-name { font-family: var(--font-heading); color: var(--color-secondary); font-weight: 800; margin-bottom: 5px; display: block; }

.comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }

.comparison-card.sekarang { border-top-color: var(--color-primary); }
.comparison-card h4 { margin-bottom: 10px; font-family: var(--font-heading); }
.jendela-kampung-card { background: white; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-md); margin: 20px 0; border: 1px solid var(--color-border); }

.infographic-flow { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 25px 0; }
.flow-step { background: white; padding: 15px; border-radius: var(--radius-md); border: 2px solid var(--color-border); text-align: center; position: relative; }
.flow-step::after { content: '➡'; position: absolute; right: -15px; top: 50%; transform: translateY(-50%); color: var(--color-primary); font-size: 1.2rem; z-index: 2; }
.flow-step:last-child::after { display: none; }
.step-number { display: inline-block; width: 30px; height: 30px; background: var(--color-primary); color: white; border-radius: 50%; line-height: 30px; font-weight: 700; margin-bottom: 10px; }
.lembaga-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin: 20px 0; }
.lembaga-card { background: white; padding: 20px; border-radius: var(--radius-md); border: 2px solid var(--color-border); border-left: 5px solid var(--color-accent); }
.game-container { display: flex; flex-direction: column; gap: 20px; }
.drag-zone { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; background: rgba(255,255,255,0.6); padding: 20px; border-radius: var(--radius-md); min-height: 80px; border: 2px dashed var(--color-border); }
.draggable-card { background: white; padding: 10px 15px; border-radius: var(--radius-sm); border: 2px solid var(--color-primary); cursor: grab; font-weight: 600; }
.drop-zones-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.drop-target { background: #fdfaf4; border: 3px dashed var(--color-border); border-radius: var(--radius-lg); padding: 20px; min-height: 180px; text-align: center; }
.drop-target.over { border-color: var(--color-accent); background: #fff8e6; }
.matching-game-container { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 20px; }
.matching-column { display: flex; flex-direction: column; gap: 12px; }
.match-card { background: white; padding: 15px; border: 2px solid var(--color-border); border-radius: var(--radius-md); cursor: pointer; text-align: center; font-weight: 600; }
.match-card:hover:not(.matched) { border-color: var(--color-accent); background: #fffdf7; }
.match-card.selected { border-color: var(--color-primary); background: #e9f5ed; }
.match-card.matched { background: #e9f5ed; border-color: var(--color-success); color: var(--color-primary); cursor: not-allowed; opacity: 0.8; }
.dampak-game-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
.dampak-box { background: white; padding: 20px; border-radius: var(--radius-lg); border: 2px solid var(--color-border); min-height: 200px; cursor: pointer; }

.dampak-item-btn { display: block; width: 100%; background: #fdfaf4; padding: 12px; margin: 8px 0; border: 1px solid var(--color-border); border-radius: var(--radius-sm); text-align: left; cursor: pointer; }

.badge-unlock-anim { text-align: center; padding: 30px; }
.badge-icon { font-size: 70px; display: block; animation: bounce 2s infinite; }

.dialog-container { flex-direction: column; align-items: center; }
.dialog-box::before { display: none; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.draggable-card {

.draggable-card.dragging {

}
.drop-target.drag-over {
border-color: var(--color-accent);

}
.drop-area {

.drop-area .draggable-card {

}

.confetti:nth-child(1) { left: 10%; background: var(--color-primary); animation-delay: 0.1s; }

.confetti:nth-child(7) { left: 15%; background: var(--color-accent); animation-delay: 0.7s; }
.confetti:nth-child(8) { left: 60%; background: var(--color-success); animation-delay: 0.8s; border-radius: 50%; }
@keyframes successPop {
0% { transform: scale(0); opacity: 0; }
60% { transform: scale(1.1); }
100% { transform: scale(1); opacity: 1; }
}
@keyframes successBounce {
0%, 100% { transform: translateY(0) rotate(0deg); }

}
@keyframes fadeInUp {

@keyframes confettiFall {

class StateManager {
constructor() { this.state = this.load(); }
load() {
const data = localStorage.getItem(APP_CONFIG.STORAGE_KEY);
return data ? JSON.parse(data) : { unlocked: [0], currentScene: 0 };
}
save() { localStorage.setItem(APP_CONFIG.STORAGE_KEY, JSON.stringify(this.state)); }
update(id) {
this.state.currentScene = id;
if (!this.state.unlocked.includes(id)) this.state.unlocked.push(id);
this.save();
}
getPercent() { return Math.round((this.state.unlocked.length / APP_CONFIG.SCENES.length) * 100); }
}
class AppRouter {
constructor(stateManager) {
this.stateManager = stateManager;
this.dom = {
main: document.getElementById('main-container'), header: document.getElementById('global-header'),
footer: document.getElementById('global-footer'), locTitle: document.getElementById('current-location-title'),
progress: document.getElementById('global-progress-bar'), btnPrev: document.getElementById('nav-btn-prev'),
btnNext: document.getElementById('nav-btn-next'), indicator: document.getElementById('scene-indicator')
};
this.bindEvents();
}
bindEvents() {
this.dom.btnNext.addEventListener('click', () => this.navigate(1));
this.dom.btnPrev.addEventListener('click', () => this.navigate(-1));
}
init() { this.render(this.stateManager.state.currentScene); }
navigate(dir) {
const nextId = this.stateManager.state.currentScene + dir;
if (nextId >= 0 && nextId < APP_CONFIG.SCENES.length) {
this.stateManager.update(nextId);
this.render(nextId);
}
}
jumpTo(id) {
this.stateManager.update(id);
this.render(id);
}
render(id) {
const scene = APP_CONFIG.SCENES[id];
const bodyElement = document.body;
if (id === 0 || id === 1) {
this.dom.header.classList.add('hidden');
this.dom.footer.classList.add('hidden');
bodyElement.classList.add('is-front-page');
} else {
this.dom.header.classList.remove('hidden');
this.dom.footer.classList.remove('hidden');
bodyElement.classList.remove('is-front-page');
}
this.dom.locTitle.textContent = scene.location;
this.dom.indicator.textContent = `${id + 1} / ${APP_CONFIG.SCENES.length}`;
this.dom.progress.style.width = `${this.stateManager.getPercent()}%`;
this.dom.btnPrev.disabled = (id === 0);
this.dom.btnNext.disabled = false;
const templateFunction = SCENE_TEMPLATES[`scene_${id}`];
if (templateFunction) {
this.dom.main.innerHTML = `<div class="scene-fade-in">${templateFunction(this.stateManager.state.unlocked)}</div>`;
} else {
this.dom.main.innerHTML = `<div>Skenario halaman kosong atau belum diimplementasikan.</div>`;
}
this.postRender(id);
}
postRender(id) {
if (id === 6) {

function playSuccessSound() {
try {
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const oscillator = audioCtx.createOscillator();
const gainNode = audioCtx.createGain();
oscillator.connect(gainNode);
gainNode.connect(audioCtx.destination);
oscillator.type = 'sine';
oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime);
oscillator.frequency.exponentialRampToValueAtTime(1046.5, audioCtx.currentTime + 0.15);
gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
oscillator.start();
oscillator.stop(audioCtx.currentTime + 0.5);
} catch (e) {
console.log("Audio tidak didukung browser.");
}
}
function createConfetti(container) {
if (!container) return;
const oldConfetti = container.querySelectorAll('.confetti');
oldConfetti.forEach(c => c.remove());
for (let i = 0; i < 8; i++) {

confetti.className = 'confetti';
container.appendChild(confetti);
}
}
